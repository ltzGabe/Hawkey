{% extends "homepage/base.html"%}
{% block Mcontent%}
<div class="container">
	
<style>

		.user_card {
			width: 350px;
			margin-top: auto;
			margin-bottom: auto;
			background-color: #419c57;
			position: relative;
			display: flex;
			justify-content: center;
			flex-direction: column;
			padding: 10px;
			box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
			-webkit-box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
			-moz-box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
			border-radius: 5px;
		}

		.form_container {
			margin-top: 20px;
		}

		#form-title{
			color: #fff;
			
		}
		.login_btn {
			width: 100%;
			background: #67c77f !important;
			color: white !important;
		}
		.login_btn:focus {
			box-shadow: none !important;
			outline: 0px !important;
		}
		.login_container {
			padding: 0 2rem;
		}
		.input-group-text {
			background: #f7ba5b !important;
			color: white !important;
			border: 0 !important;
			border-radius: 0.25rem 0 0 0.25rem !important;
		}
		.input_user,
		.input_pass:focus {
			box-shadow: none !important;
			outline: 0px !important;
		}

		#messages{
			background-color: grey;
			color: #fff;
			padding: 10px;
			margin-top: 10px;
		}
</style>
  <!-- Login Form -->
  <div class="container">
    <div class="row justify-content-center mt-5">
      <div class="col-lg-4 col-md-6 col-sm-6">
        <div class="card shadow">
          <div class="card-title text-center border-bottom">
            <h2 class="p-3">Reset password</h2>
          </div> 
		  <form method="POST" action="">
          <div class="card-body">
            <form method="POST" action="javascript:void(0);"> {% csrf_token %}
                <div class="form-group">
                    <div style="display:none;" class="alert alert-danger" role="alert" id="wrongPassword">Wrong password.</div>
					 {{resetPassword.passwordnew}} {{resetPassword.passwordnew1}}
                    <div style="display:none;" class="alert alert-danger" id="diffPasswords" role="alert">Passwords do not match.</div>
                </div>
                <input type="submit" id="changePassword" value="Change password" class="btn btn-primary">
                <style>
                .alert {
                    margin-top: 5px;
                    padding: 0;
                    padding-top: 2px;
                    height: 30px;
                    text-align: center;
                }
                </style>
            </form>

   

              <div class="d-grid">
                <button type="submit" value="Send email" style="background-color: #4c925d; margin-top: 10px;" class="btn text-light main-bg">Reset password</button>
              </div>
			  
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

			
<script>
	document.getElementsByName("email")[0].classList.add('form-control');
</script>

{%endblock%}
